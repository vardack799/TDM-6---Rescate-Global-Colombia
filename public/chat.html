<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat - Rescate Global</title>
  <link rel="stylesheet" href="./css/chat.css" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    .chat-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 600px;
      margin: 30px auto;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .chat-header {
      background: #0077b6;
      color: white;
      padding: 15px;
      font-size: 18px;
      text-align: center;
    }
    .messages {
      flex: 1;
      height: 400px;
      overflow-y: auto;
      padding: 15px;
      border-bottom: 1px solid #ccc;
    }
    .message {
      margin-bottom: 10px;
      padding: 8px 12px;
      border-radius: 6px;
      max-width: 80%;
    }
    .message.self {
      background: #0077b6;
      color: white;
      margin-left: auto;
    }
    .message.other {
      background: #e0e0e0;
      color: black;
      margin-right: auto;
    }
    .chat-input {
      display: flex;
      padding: 10px;
    }
    .chat-input input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
    }
    .chat-input button {
      margin-left: 10px;
      padding: 10px 15px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #0077b6;
      color: white;
      cursor: pointer;
    }
    .chat-input button:hover {
      background: #005f87;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">💬 Chat de Rescate Global</div>
    <div id="messages" class="messages"></div>
    <div class="chat-input">
      <input id="messageInput" type="text" placeholder="Escribe un mensaje..." />
      <button id="sendBtn">Enviar</button>
    </div>
  </div>
  <script src="./js/chat.js"></script>
</body>
</html>
