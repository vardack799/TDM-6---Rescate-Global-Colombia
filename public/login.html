<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro</title>
  <link rel="stylesheet" href="./css/login.css" />
</head>
<body>
  <div class="login-container">
    <h1>Registro</h1>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Usuario" required />
      <input type="password" id="password" placeholder="Contraseña" required />

      <h3>Selecciona una categoría</h3>
      <div class="category-buttons">
        <button type="button" class="category-btn" data-cat="inundacion">🌊 Inundación</button>
        <button type="button" class="category-btn" data-cat="terremoto">🌎 Terremoto</button>
        <button type="button" class="category-btn" data-cat="incendio">🔥 Incendio</button>
        <button type="button" class="category-btn" data-cat="otro">❓ Otro</button>
      </div>
      <input type="hidden" id="category" name="category" />

      <button type="submit">Entrar</button>
    </form>
  </div>
  <script src="./js/login.js"></script>
</body>
</html>
